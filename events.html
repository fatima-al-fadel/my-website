    color: #6610f2;

      const container = document.getElementById("eventsContainer");
      const searchInput = document.getElementById("searchInput");
      const dateFilter = document.getElementById("dateFilter");
      const placeFilter = document.getElementById("placeFilter");
      const categoryFilter = document.getElementById("categoryFilter");

      function renderEvents(events) {
        container.innerHTML = "";
        if (events.length === 0) {
          container.innerHTML = `<p class="text-center text-light opacity-75 translatable"
                                  data-en="No events found."
                                  data-ar="لم يتم العثور على فعاليات.">No events found.</p>`;
          return;
        }

        events.forEach(event => {
          container.innerHTML += `
            <div class="col-md-3 event-card" data-name="${event.title.toLowerCase()}" data-date="${event.date}">
              <img src="${event.image}" alt="${event.title}" class="img-fluid rounded shadow">
              <div class="card-body text-center text-light">
                <h5 class="event-title fw-bold ">${event.title}</h5>
                <p class="event-info text-muted"><i class="bi bi-calendar-event"></i> ${event.date}</p>
                <p class="event-info text-muted"><i class="bi bi-geo-alt"></i> ${event.place}</p>
                <p class="small opacity-75 text-muted">${event.description}</p>
                <button class="btn btn-outline-info btn-sm rounded-pill px-3 translatable"
                  data-en="Details"
                  data-ar="التفاصيل"
                  data-title="${event.title}"
                  data-date="${event.date}"
                  data-place="${event.place}"
                  data-description="${event.description}"
                  data-image="${event.image}"
                  data-category="${event.category}"
                  onclick="openEvent(this)">Details</button>
              </div>
            </div>`;
        });
      }

      function filterEvents() {
  const searchValue = searchInput.value.toLowerCase();
  const dateValue = dateFilter.value;
  const placeValue = placeFilter.value.toLowerCase();
  const categoryValue = categoryFilter.value;

    const filtered = allEvents.filter(event => {
    const matchName = event.title.toLowerCase().includes(searchValue);

    const matchDate = !dateValue || event.date.includes(dateValue);

    const matchPlace = event.place.toLowerCase().includes(placeValue);

    const matchCategory = !categoryValue || event.category === categoryValue;

    return matchName && matchDate && matchPlace && matchCategory;
  });

  renderEvents(filtered);
}

      searchInput.addEventListener("input", filterEvents);
      dateFilter.addEventListener("change", filterEvents);
      placeFilter.addEventListener("input", filterEvents);
      categoryFilter.addEventListener("change", filterEvents);
      

      function openEvent(button) {
        const eventData = {
          title: button.dataset.title,
          date: button.dataset.date,
          place: button.dataset.place,
          image: button.dataset.image,
          description: button.dataset.description,
          category: button.dataset.category
        };
        localStorage.setItem("selectedEvent", JSON.stringify(eventData));
        const similar = allEvents.filter(ev => ev.category === eventData.category && ev.title !== eventData.title);
        localStorage.setItem("similarEvents", JSON.stringify(similar));
        window.location.href = "event.html";
      }

      document.addEventListener("DOMContentLoaded", () => renderEvents(allEvents));

      
  </script>

  <script>
      const arFlag = document.getElementById('arFlag');
      const enFlag = document.getElementById('enFlag');
      const translatable = document.querySelectorAll('.translatable');

      function setLanguage(lang) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

        translatable.forEach(el => {
          const text = el.getAttribute(`data-${lang}`);
          if (text) el.textContent = text;
        });

        const inputs = document.querySelectorAll('[data-en-placeholder]');
        inputs.forEach(input => {
          input.placeholder = input.getAttribute(`data-${lang}-placeholder`);
        });

        const cards = document.querySelectorAll('.event-card');
        cards.forEach((card, i) => {
          const e = allEvents[i];
          if (!e) return;
          const title = lang === 'ar' ? e.title_ar : e.title;
          const place = lang === 'ar' ? e.place_ar : e.place;
          const desc = lang === 'ar' ? e.description_ar : e.description;
          card.querySelector('.event-title').textContent = title;
          card.querySelectorAll('.event-info')[1].innerHTML = `<i class="bi bi-geo-alt"></i> ${place}`;
          card.querySelector('.small').textContent = desc;
          const btn = card.querySelector('button');
          btn.textContent = lang === 'ar' ? 'التفاصيل' : 'Details';
        });
      }

      if (arFlag) arFlag.addEventListener('click', () => setLanguage('ar'));
      if (enFlag) enFlag.addEventListener('click', () => setLanguage('en'));

 
  </script>
