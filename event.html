<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
  .event-spotlight {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
  }
  .glass-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(13, 202, 240, 0.3);
  }

  .image-frame {
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    transition: all 0.3s ease;
  }
  .image-frame:hover {
    transform: scale(1.05);
  }

  .event-badge {
    background: linear-gradient(90deg, #0dcaf0, #0d6efd);
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .text-gradient {
    background: linear-gradient(90deg, #0dcaf0, #6f42c1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .event-img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    border-radius: 16px;
  }

  #relatedEvents .card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #fff;
    transition: 0.3s;
  }
  #relatedEvents .card:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-4px);
  }

    
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top shadow-sm custom-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
      <span class="translatable fs-5" data-en="Virtual University Events" data-ar="فعاليات الجامعة الافتراضية">Virtual University Events</span>
    </a>
    <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <i class="bi bi-list fs-1"></i>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav align-items-center gap-lg-3 text-center">
        <li class="nav-item">
          <a class="nav-link active translatable" data-en="Home" data-ar="الرئيسية" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link translatable" data-en="Events" data-ar="الفعاليات" href="events.html">Events</a>
        </li>
        <li class="nav-item">
          <a class="nav-link translatable" data-en="About" data-ar="حول الموقع" href="about.html">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link translatable" data-en="Contact" data-ar="اتصل بنا" href="contact.html">Contact</a>
        </li>
      </ul>
      <div class="ms-lg-4 mt-3 mt-lg-0 d-flex justify-content-center gap-2">
        <img src="https://flagcdn.com/w40/us.png" id="enFlag" class="flag-btn" alt="English">
        <img src="https://flagcdn.com/w40/sy.png" id="arFlag" class="flag-btn" alt="Arabic">
      </div>
    </div>
  </div>
</nav>

<section class="event-spotlight py-5">
  <div class="container">
    <div class="row align-items-center justify-content-center g-5">
      
      <div class="col-lg-5 text-center">
        <div class="image-frame position-relative d-inline-block shadow-lg rounded-4 overflow-hidden">
          <img id="eventImage" src="assets/imgs/default.jpg" 
               class="img-fluid event-img" alt="Event Image">
          <div class="event-badge position-absolute top-0 start-0 m-3 px-3 py-1 rounded-pill text-white fw-semibold" id="eventCategory">
            Category
          </div>
        </div>
      </div>

      <div class="col-lg-6 text-light">
        <div class="glass-card p-4 rounded-4 shadow-lg">
          <h2 id="eventTitle" class="fw-bold mb-3 text-gradient">Event Title</h2>
          <p class="mb-2">
            <strong class="text-info trans" data-en=" Location:" data-ar=" الموقع:"> Location:</strong>
            <span id="eventPlace">---</span>
          </p>
          <p class="mb-3">
            <strong class="text-info trans" data-en=" Date & Time:" data-ar="التاريخ والوقت:"> Date & Time:</strong>
            <span id="eventDate">---</span>
          </p>
          <p id="eventDescription" class="lead text-white-50">The event description will appear here.</p>

          <button class="btn btn-outline-info mt-3 px-4">
            <i class="bi bi-ticket-perforated me-2"></i> Register
          </button>
        </div>
      </div>
    </div>

    <div class="mt-5 pt-4 border-top border-secondary-subtle">
      <h4 class="text-center mb-4 text-light trans" data-en="Related Events" data-ar="فعاليات مشابهة">Related Events</h4>
      <div class="row justify-content-center g-4 text-muted" id="relatedEvents">
      </div>
    </div>
  </div>
</section>


<footer class="footer-section text-center text-white ">
  <div class="container py-5">
    
    <h5 class="fw-bold mb-4 translatable" data-en="Follow Us" data-ar="تابعنا">Follow Us</h5>
    
    <div class="d-flex justify-content-center gap-3 mb-4">
      <a href="https://www.facebook.com/share/1FVXJKkBu7" class="social-link"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.instagram.com/syrian_virtual_university?igsh=aWE1eGMyaDh4OW9o" class="social-link"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/SVU_Syria" class="social-link"><i class="fab fa-twitter"></i></a>
      <a href="https://www.linkedin.com/school/syrianvirtualuniversity/" class="social-link"><i class="fab fa-linkedin-in"></i></a>
      <a href="http://www.youtube.com/@SyrianVirtualUniversitySVU" class="social-link" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="http://www.svuonline.org" class="social-link" target="_blank"><i class="fas fa-globe"></i></a>
    </div>

    <hr class="footer-divider mx-auto" />

    <p class="small mt-3 mb-0 translatable" data-en="© 2026 Virtual University | Events Guide" data-ar="© 2026 جميع الحقوق محفوظة | فعاليات الجامعة الافتراضية">
      © 2026 Virtual University | Events Guide
    </p>
  </div>
</footer>

<button id="scrollTopBtn"><i class="bi bi-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const eventData = JSON.parse(localStorage.getItem("selectedEvent"));
  if (eventData) {
    document.getElementById("eventTitle").textContent = eventData.title;
    document.getElementById("eventCategory").textContent = eventData.category;
    document.getElementById("eventPlace").textContent = eventData.place;
    document.getElementById("eventDate").textContent = eventData.date;
    document.getElementById("eventDescription").textContent = eventData.description;
    document.getElementById("eventImage").src = eventData.image;
  }

  const enFlag = document.getElementById("enFlag");
  const arFlag = document.getElementById("arFlag");

  function setLanguage(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    document.querySelectorAll(".trans").forEach(el => {
      el.textContent = el.dataset[lang];
    });
  }

  enFlag.addEventListener("click", () => setLanguage("en"));
  arFlag.addEventListener("click", () => setLanguage("ar"));
</script>

</body>
</html>
